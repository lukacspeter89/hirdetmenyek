name: Backfill (60 nap, éjszakai)

on:
  schedule:
    # Csak éjszaka, kímélő tempóban: 21:30, 23:30, 01:30, 03:30 UTC
    # (= 23:30, 01:30, 03:30, 05:30 Bp. nyári idő szerint)
    - cron: "30 21,23,1,3 * * *"
  workflow_dispatch:

concurrency:
  group: backfill
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests

      - name: Backfill futtatása
        run: |
          set +e
          python scripts/backfill.py
          code=$?
          if [ "$code" != "0" ] && [ "$code" != "2" ]; then exit "$code"; fi

      - name: Adatok commitolása
        run: |
          git config user.name "hirdetmeny-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data
          if git diff --cached --quiet; then
            echo "Nincs változás."
          else
            git commit -m "adat: backfill $(date -u +'%Y-%m-%d %H:%M') UTC"
            git pull --rebase origin ${GITHUB_REF_NAME} || true
            git push
          fi
