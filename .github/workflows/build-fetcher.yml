name: Build fetcher (Go/uTLS bináris)

# Kézzel indítható: Actions → Build fetcher → Run workflow.
# Lefordítja a böngésző-TLS letöltőt Windows-teszthez és a 32-bites NAS-hoz,
# és feltölti a két binárist "artifact"-ként (a futás oldalán letölthető).
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Függőségek feloldása
        working-directory: nas-fetcher
        run: go mod tidy

      - name: Fordítás – Windows teszt (amd64)
        working-directory: nas-fetcher
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: "0"
        run: go build -trimpath -ldflags "-s -w" -o fetcher.exe .

      - name: Fordítás – NAS (linux/386, statikus)
        working-directory: nas-fetcher
        env:
          GOOS: linux
          GOARCH: "386"
          CGO_ENABLED: "0"
        run: go build -trimpath -ldflags "-s -w" -o fetcher-linux-386 .

      - name: Ellenőrzés (statikus-e a linux bináris)
        working-directory: nas-fetcher
        run: file fetcher-linux-386 || true

      - name: Windows teszt-bináris feltöltése
        uses: actions/upload-artifact@v4
        with:
          name: fetcher-windows
          path: nas-fetcher/fetcher.exe

      - name: NAS-bináris feltöltése
        uses: actions/upload-artifact@v4
        with:
          name: fetcher-linux-386
          path: nas-fetcher/fetcher-linux-386
