<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Földhirdetmény-térkép — adás-vétel és haszonbérlet</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  :root { --green:#2e7d32; --red:#c62828; --bg:#f6f7f9; --card:#fff; --line:#e2e5ea; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
         background:var(--bg); color:#1c2330; height:100vh; display:flex; flex-direction:column; }
  header { padding:8px 14px; background:#fff; border-bottom:1px solid var(--line);
           display:flex; flex-wrap:wrap; gap:8px; align-items:center; }
  header h1 { font-size:16px; margin:0 12px 0 0; white-space:nowrap; }
  .seg { display:flex; border:1px solid var(--line); border-radius:8px; overflow:hidden; }
  .seg button { border:0; background:#fff; padding:6px 12px; cursor:pointer; font-size:13px; }
  .seg button.on { background:#1c2330; color:#fff; }
  select,input[type=text],input[type=number] {
    border:1px solid var(--line); border-radius:8px; padding:6px 8px; font-size:13px; background:#fff; }
  input[type=number] { width:86px; }
  label.chk { font-size:13px; display:flex; align-items:center; gap:4px; }
  #main { flex:1; display:flex; min-height:0; }
  #map { flex:1.4; min-width:0; }
  #side { flex:1; max-width:460px; min-width:320px; overflow-y:auto; padding:10px;
          border-left:1px solid var(--line); background:var(--bg); }
  #stats { font-size:12px; color:#5a6472; margin:2px 0 8px; }
  .legend { display:flex; align-items:center; gap:6px; font-size:11px; color:#5a6472; margin-bottom:8px; }
  .legend .bar { flex:1; height:8px; border-radius:4px;
    background:linear-gradient(90deg,hsl(120,70%,42%),hsl(60,75%,45%),hsl(0,70%,45%)); }
  .card { background:var(--card); border:1px solid var(--line); border-radius:10px;
          padding:10px 12px; margin-bottom:8px; font-size:13px; }
  .card .top { display:flex; justify-content:space-between; align-items:baseline; gap:8px; }
  .card .place { font-weight:600; font-size:14px; }
  .card .badge { font-size:11px; padding:2px 7px; border-radius:10px; background:#eef1f5; white-space:nowrap; }
  .card .badge.b { background:#e3ecfa; }
  .chip { display:inline-block; padding:2px 8px; border-radius:10px; color:#fff;
          font-weight:600; font-size:12px; }
  .chip.na { background:#9aa3af; }
  .row { margin-top:4px; color:#3b4453; }
  .row b { color:#1c2330; }
  .muted { color:#8a93a1; font-size:12px; }
  .card a { color:#175cd3; text-decoration:none; font-size:12px; }
  .exp { color:#b25e09; font-size:11px; font-weight:600; }
  .live { color:#1a7f37; font-size:11px; font-weight:600; }
  #loading { position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
             background:rgba(255,255,255,.8); z-index:2000; font-size:15px; }
  @media (max-width:820px) {
    #main { flex-direction:column; }
    #map { min-height:45vh; }
    #side { max-width:none; border-left:0; border-top:1px solid var(--line); }
  }
</style>
</head>
<body>
<header>
  <h1>Földhirdetmény-térkép</h1>
  <div class="seg" id="modeSeg">
    <button data-m="adasvetel" class="on">Adás-vétel</button>
    <button data-m="haszonberlet">Haszonbérlet</button>
  </div>
  <select id="fMegye"><option value="">Minden vármegye</option></select>
  <select id="fJaras"><option value="">Minden járás</option></select>
  <input type="text" id="fTel" list="telList" placeholder="Település…">
  <datalist id="telList"></datalist>
  <input type="number" id="fHaMin" placeholder="ha min" min="0" step="0.1">
  <input type="number" id="fHaMax" placeholder="ha max" min="0" step="0.1">
  <input type="number" id="fFphMin" placeholder="Ft/ha min" min="0" step="1000">
  <input type="number" id="fFphMax" placeholder="Ft/ha max" min="0" step="1000">
  <label class="chk"><input type="checkbox" id="fLive" checked> csak élő kifüggesztés</label>
  <select id="fSort">
    <option value="uj">Legújabb elöl</option>
    <option value="fphAsc">Ft/ha ↑</option>
    <option value="fphDesc">Ft/ha ↓</option>
    <option value="haDesc">Terület ↓</option>
  </select>
  <button id="reset" style="border:1px solid var(--line);background:#fff;border-radius:8px;padding:6px 10px;cursor:pointer;font-size:13px">Szűrők törlése</button>
</header>
<div id="main">
  <div id="map"></div>
  <div id="side">
    <div class="legend"><span>olcsóbb</span><div class="bar"></div><span>drágább</span>
      <span id="scaleNote">(járáson belül)</span></div>
    <div id="stats"></div>
    <div id="cards"></div>
  </div>
</div>
<div id="loading">Adatok betöltése…</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
"use strict";
const $ = id => document.getElementById(id);
const fmt = n => n == null ? "–" : n.toLocaleString("hu-HU");
const today = new Date().toISOString().slice(0, 10);

let ITEMS = [], GEO = {}, JAR = {}, map, layer;
let state = { m: "adasvetel", megye: "", jaras: "", tel: "", haMin: "", haMax: "",
              fphMin: "", fphMax: "", live: true, sort: "uj" };

/* ---------- betöltés ---------- */
async function loadAll() {
  const idx = await (await fetch("data/index.json")).json().catch(() => ({partitions: []}));
  const parts = (idx && idx.partitions) || [];
  const fetches = parts.map(p => fetch(`data/items/${p}.json`).then(r => r.json()).catch(() => ({})));
  const [geo, jar, ...months] = await Promise.all([
    fetch("data/geo/telepulesek.json").then(r => r.json()).catch(() => ({})),
    fetch("data/geo/jaras_static.json").then(r => r.json()).catch(() => ({})),
    ...fetches]);
  GEO = geo || {}; JAR = jar || {};
  for (const mo of months) for (const k in mo) ITEMS.push(mo[k]);
  // megye/járás hozzárendelés
  for (const it of ITEMS) {
    const s = JAR[it.telepules] || {};
    const g = GEO[it.telepules] || null;
    it._megye = s.m || (g && g.megye ? g.megye.replace(/\s*vármegye$/i, "") : null);
    it._jaras = s.j || null;
    it._lat = g ? g.lat : null; it._lon = g ? g.lon : null;
    it._ha = it.terulet_m2 ? it.terulet_m2 / 10000 : null;
  }
  computeScale();
}

/* ---------- színskála: rang a járáson belül (kevés adatnál megye/országos) ---------- */
function computeScale() {
  for (const mode of ["adasvetel", "haszonberlet"]) {
    const comp = ITEMS.filter(i => i.tipus === mode && i.comparable && i.ft_per_ha > 0);
    const by = key => {
      const g = {};
      for (const i of comp) { const k = key(i) || "?"; (g[k] = g[k] || []).push(i); }
      return g;
    };
    const gj = by(i => i._jaras), gm = by(i => i._megye);
    for (const i of comp) {
      let grp = gj[i._jaras || "?"];
      let note = "járás";
      if (!grp || grp.length < 5) { grp = gm[i._megye || "?"]; note = "megye"; }
      if (!grp || grp.length < 5) { grp = comp; note = "országos"; }
      const sorted = grp.map(x => x.ft_per_ha).sort((a, b) => a - b);
      const r = sorted.indexOf(i.ft_per_ha);
      i["_pct_" + mode] = sorted.length > 1 ? r / (sorted.length - 1) : 0.5;
      i["_scope_" + mode] = note;
    }
  }
}
const pctColor = p => `hsl(${Math.round(120 * (1 - p))},70%,42%)`;

/* ---------- szűrés ---------- */
function filtered() {
  return ITEMS.filter(i => {
    if (i.tipus !== state.m) return false;
    if (state.megye && i._megye !== state.megye) return false;
    if (state.jaras && i._jaras !== state.jaras) return false;
    if (state.tel && i.telepules !== state.tel) return false;
    if (state.live && (!i.lejarat || i.lejarat < today)) return false;
    if (state.haMin !== "" && !(i._ha >= +state.haMin)) return false;
    if (state.haMax !== "" && !(i._ha <= +state.haMax)) return false;
    if (state.fphMin !== "" && !(i.ft_per_ha >= +state.fphMin)) return false;
    if (state.fphMax !== "" && !(i.ft_per_ha <= +state.fphMax)) return false;
    return true;
  });
}

/* ---------- térkép ---------- */
function drawMap(list) {
  if (layer) layer.remove();
  layer = L.layerGroup().addTo(map);
  const byTel = {};
  for (const i of list) if (i._lat) (byTel[i.telepules] = byTel[i.telepules] || []).push(i);
  for (const tel in byTel) {
    const arr = byTel[tel];
    const pcts = arr.map(i => i["_pct_" + state.m]).filter(p => p != null).sort((a, b) => a - b);
    const med = pcts.length ? pcts[Math.floor(pcts.length / 2)] : null;
    const fphs = arr.map(i => i.ft_per_ha).filter(Boolean).sort((a, b) => a - b);
    const medF = fphs.length ? fphs[Math.floor(fphs.length / 2)] : null;
    const col = med == null ? "#9aa3af" : pctColor(med);
    const mk = L.circleMarker([arr[0]._lat, arr[0]._lon], {
      radius: Math.min(14, 5 + Math.sqrt(arr.length) * 2),
      color: "#fff", weight: 1.5, fillColor: col, fillOpacity: .88 }).addTo(layer);
    mk.bindTooltip(`<b>${tel}</b><br>${arr.length} hirdetmény` +
      (medF ? `<br>medián: ${fmt(medF)} Ft/ha${state.m === "haszonberlet" ? "/év" : ""}` : ""));
    mk.on("click", () => { state.tel = tel; $("fTel").value = tel; render(); });
  }
}

/* ---------- kártyák ---------- */
function drawCards(list) {
  const sorters = {
    uj: (a, b) => (b.kifuggesztes || "").localeCompare(a.kifuggesztes || ""),
    fphAsc: (a, b) => (a.ft_per_ha || 9e15) - (b.ft_per_ha || 9e15),
    fphDesc: (a, b) => (b.ft_per_ha || -1) - (a.ft_per_ha || -1),
    haDesc: (a, b) => (b._ha || 0) - (a._ha || 0),
  };
  list.sort(sorters[state.sort] || sorters.uj);
  const el = $("cards");
  el.innerHTML = "";
  const statusTxt = { aranykorona_alapu_dij: "AK-alapú díj", termeny_alapu_dij: "terményben fizetett díj",
    vegyes_egysegek: "vegyes egységek", terulet_hianyos: "hiányos terület",
    ar_nem_ertelmezheto: "nem értelmezhető ár", nincs_ar: "nincs ár" };
  const perYr = state.m === "haszonberlet" ? "/év" : "";
  for (const i of list.slice(0, 300)) {
    const pct = i["_pct_" + state.m];
    const chip = i.comparable && pct != null
      ? `<span class="chip" style="background:${pctColor(pct)}">${fmt(i.ft_per_ha)} Ft/ha${perYr}</span>`
      : `<span class="chip na">${statusTxt[i.status] || "n/a"}</span>`;
    const live = i.lejarat && i.lejarat >= today
      ? `<span class="live">élő · lejár: ${i.lejarat}</span>`
      : `<span class="exp">lejárt: ${i.lejarat || "?"}</span>`;
    el.insertAdjacentHTML("beforeend", `<div class="card">
      <div class="top"><span class="place">${i.telepules || "?"}</span>
        <span class="badge ${i.tipus === "haszonberlet" ? "b" : ""}">${i.tipus === "haszonberlet" ? "Haszonbérlet" : "Adás-vétel"}</span></div>
      <div class="muted">${i._jaras || ""}${i._jaras && i._megye ? " · " : ""}${i._megye || ""} vm.</div>
      <div class="row">${chip}&nbsp; <b>${i._ha ? i._ha.toLocaleString("hu-HU", {maximumFractionDigits: 2}) + " ha" : "?"}</b>
        ${i.ar_ft ? "· " + fmt(i.ar_ft) + " Ft" + perYr : ""}</div>
      <div class="row">hrsz: ${(i.hrsz || []).join(", ") || "?"} · ${(i.muvelesi_ag || []).join(", ") || "?"}</div>
      <div class="row muted">kifüggesztve: ${i.kifuggesztes || "?"} · ${live}</div>
      <div class="row"><a href="${i.link}" target="_blank" rel="noopener">hirdetmény megnyitása ↗</a></div>
    </div>`);
  }
  if (list.length > 300)
    el.insertAdjacentHTML("beforeend", `<div class="muted">… és még ${list.length - 300} tétel (szűkítsd a keresést)</div>`);
}

/* ---------- vezérlők ---------- */
function fillSelectors() {
  const megyek = [...new Set(ITEMS.map(i => i._megye).filter(Boolean))].sort((a, b) => a.localeCompare(b, "hu"));
  $("fMegye").innerHTML = '<option value="">Minden vármegye</option>' +
    megyek.map(m => `<option>${m}</option>`).join("");
  const tels = [...new Set(ITEMS.map(i => i.telepules).filter(Boolean))].sort((a, b) => a.localeCompare(b, "hu"));
  $("telList").innerHTML = tels.map(t => `<option value="${t}">`).join("");
  fillJaras();
}
function fillJaras() {
  const src = ITEMS.filter(i => !state.megye || i._megye === state.megye);
  const js = [...new Set(src.map(i => i._jaras).filter(Boolean))].sort((a, b) => a.localeCompare(b, "hu"));
  $("fJaras").innerHTML = '<option value="">Minden járás</option>' +
    js.map(j => `<option${j === state.jaras ? " selected" : ""}>${j}</option>`).join("");
}

function render() {
  const list = filtered();
  drawMap(list);
  drawCards(list);
  const comp = list.filter(i => i.comparable).length;
  $("stats").textContent = `${list.length} hirdetmény (${comp} árral összehasonlítható)` +
    (state.tel ? ` — ${state.tel}` : "");
  const q = new URLSearchParams();
  for (const [k, v] of Object.entries(state)) if (v !== "" && v !== false && !(k === "m" && v === "adasvetel") && !(k === "live" && v === true) && !(k === "sort" && v === "uj")) q.set(k, v);
  history.replaceState(null, "", q.toString() ? "?" + q : location.pathname);
}

function bind() {
  $("modeSeg").querySelectorAll("button").forEach(b => b.onclick = () => {
    state.m = b.dataset.m;
    $("modeSeg").querySelectorAll("button").forEach(x => x.classList.toggle("on", x === b));
    $("scaleNote").textContent = "(járáson belül)";
    render();
  });
  $("fMegye").onchange = e => { state.megye = e.target.value; state.jaras = ""; fillJaras(); render(); };
  $("fJaras").onchange = e => { state.jaras = e.target.value; render(); };
  $("fTel").onchange = e => { state.tel = e.target.value.trim(); render(); };
  $("fTel").oninput = e => { if (!e.target.value) { state.tel = ""; render(); } };
  for (const [id, key] of [["fHaMin","haMin"],["fHaMax","haMax"],["fFphMin","fphMin"],["fFphMax","fphMax"]])
    $(id).onchange = e => { state[key] = e.target.value; render(); };
  $("fLive").onchange = e => { state.live = e.target.checked; render(); };
  $("fSort").onchange = e => { state.sort = e.target.value; render(); };
  $("reset").onclick = () => {
    state = { m: state.m, megye: "", jaras: "", tel: "", haMin: "", haMax: "",
              fphMin: "", fphMax: "", live: true, sort: "uj" };
    ["fMegye","fJaras","fTel","fHaMin","fHaMax","fFphMin","fFphMax"].forEach(i => $(i).value = "");
    $("fLive").checked = true; $("fSort").value = "uj"; fillJaras(); render();
  };
}

function restoreState() {
  const q = new URLSearchParams(location.search);
  for (const k of Object.keys(state)) if (q.has(k)) {
    state[k] = k === "live" ? q.get(k) === "true" : q.get(k);
  }
  if (q.has("m")) $("modeSeg").querySelectorAll("button")
    .forEach(x => x.classList.toggle("on", x.dataset.m === state.m));
  $("fMegye").value = state.megye; $("fTel").value = state.tel;
  $("fHaMin").value = state.haMin; $("fHaMax").value = state.haMax;
  $("fFphMin").value = state.fphMin; $("fFphMax").value = state.fphMax;
  $("fLive").checked = state.live !== false && state.live !== "false";
  $("fSort").value = state.sort;
}

/* ---------- indítás ---------- */
(async function () {
  map = L.map("map", { zoomSnap: .5 }).setView([47.16, 19.5], 7);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
    { attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> | adat: hirdetmenyek.gov.hu' }).addTo(map);
  try { await loadAll(); } catch (e) { console.error(e); }
  fillSelectors(); bind(); restoreState(); fillJaras(); render();
  $("loading").remove();
})();
</script>
</body>
</html>
